server {
    listen 80;
    server_name _;
    
    # Resolver obligatorio para DNS dinámico de Railway
    resolver 8.8.8.8 valid=10s;
    
    # Variable para forzar resolución DNS en cada request
    set $backend "http://pure-charisma.railway.internal";

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Usa la variable, NO el nombre directamente
        proxy_pass $backend;
        
        # Header HOST crítico - usa el nombre interno
        proxy_set_header Host pure-charisma.railway.internal;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}