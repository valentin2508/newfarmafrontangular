server {
    listen 8080;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # PRIMERO: Todas las rutas API van al backend
    location /api/ {
        proxy_pass http://pure-charisma.railway.internal:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # DESPUÉS: Archivos estáticos (imágenes, CSS, JS, etc.)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # FINALMENTE: Todo lo demás va a Angular (para que maneje sus rutas)
    location / {
        try_files $uri $uri/ /index.html;
    }
}