server {
    listen 80;
    server_name _;
    
    # Resolver obligatorio para Railway
    resolver 8.8.8.8 valid=10s;
    
    # Variable para forzar resolución DNS en cada request
    set $backend "http://pure-charisma.railway.internal";

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # Headers para cache
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /api/ {
        # Usa la variable para que Nginx resuelva DNS cada vez
        proxy_pass $backend;
        
        # Headers críticos
        proxy_set_header Host pure-charisma.railway.internal;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts generosos
        proxy_connect_timeout 10s;
        proxy_send_timeout 20s;
        proxy_read_timeout 20s;
        
        # Buffers
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
}