server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;

    # Resolver OBLIGATORIO para Railway
    resolver 8.8.8.8 8.8.4.4 valid=10s ipv6=off;
    
    # Variable para forzar resolución
    set $backend "http://pure-charisma.railway.internal:8080";

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass $backend;
        proxy_set_header Host pure-charisma.railway.internal;
        proxy_set_header X-Real-IP $remote_addr;
    }
}