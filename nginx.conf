server {
    listen 80;
    server_name tudominio.com; # O el que uses

    location /api/ { # Ejemplo: todas las llamadas a /api/ van al backend
        proxy_pass https://pure-charisma-production-5f5b.up.railway.app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # ... otros headers
    }

    location / {
        # Configuración para archivos estáticos de tu frontend
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}