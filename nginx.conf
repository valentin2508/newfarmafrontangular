server {
    listen 80;
    server_name _;
    
    # Raíz de la aplicación
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # IMPORTANTE: Usar la IPv6 directa entre corchetes
        proxy_pass http://[fd12:d030:7a91:1:2000:a0:25d2:cc91]:8080;
        
        # Headers críticos
        proxy_set_header Host pure-charisma.railway.internal;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Forzar IPv6
        proxy_bind [fd12:d030:7a91:1:2000:e4:8753:dfc1];
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}