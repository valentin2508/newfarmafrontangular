server {
    # Usa el puerto de Railway (8080 normalmente) o fallback a 8080
    listen ${PORT:-8080};
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    location /api/check/ {
        proxy_pass http://pure-charisma.railway.internal:8080/api/check/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}