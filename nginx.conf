server {
    listen 80;
    server_name _;
    
    # Raíz de la aplicación
    root /usr/share/nginx/html;
    index index.html;

    # Resolver para DNS interno de Railway
    resolver 8.8.8.8 8.8.4.4 valid=10s;
    
    # Variable para forzar resolución
    set $backend "http://pure-charisma.railway.internal:8080";

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Usar variable para que use el resolver
        proxy_pass $backend;
        
        # Headers estándar
        proxy_set_header Host pure-charisma.railway.internal;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Logs para debug
        access_log /var/log/nginx/api_access.log;
        error_log /var/log/nginx/api_error.log debug;
    }
}