server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # LA IP QUE FUNCIONÓ EN EL CURL
        proxy_pass http://10.210.204.145:8080;
        
        # SIN NADA MÁS, solo lo básico
        proxy_set_header Host $host;
    }
}